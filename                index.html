<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1a4373">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Agro Pro">
    <link rel="manifest" href="manifest.json">
    <title>Agro Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: linear-gradient(135deg, #1a4373 0%, #0e2a48 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .container {
            max-width: 400px;
            width: 100%;
        }

        /* Card Principal */
        .hero-card {
            background: white;
            border-radius: 32px;
            padding: 24px 20px;
            text-align: center;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.3);
        }

        .logo {
            font-size: 56px;
            margin-bottom: 8px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        h1 {
            font-size: 26px;
            color: #1a4373;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: #5a6e7c;
            font-size: 12px;
            margin-bottom: 16px;
        }

        .tagline {
            background: #f0f2f5;
            padding: 8px 12px;
            border-radius: 24px;
            margin: 12px 0;
            font-size: 12px;
            color: #2c3e50;
        }

        .tagline strong {
            color: #1a4373;
        }

        /* Botão Principal */
        .btn-entrar {
            background: linear-gradient(135deg, #1a4373 0%, #0e2a48 100%);
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 40px;
            width: 100%;
            cursor: pointer;
            margin: 16px 0;
            transition: transform 0.1s;
            box-shadow: 0 4px 12px rgba(26, 67, 115, 0.3);
        }

        .btn-entrar:active {
            transform: scale(0.97);
        }

        /* Grid de Funcionalidades - Compacto */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin: 12px 0;
        }

        .info-card {
            background: #f8fafc;
            border-radius: 20px;
            padding: 12px 4px;
            text-align: center;
        }

        .info-icon {
            font-size: 24px;
            margin-bottom: 4px;
        }

        .info-card h3 {
            font-size: 11px;
            color: #1a4373;
            font-weight: 700;
        }

        .info-card p {
            font-size: 9px;
            color: #7f8c8d;
        }

        /* Banner de instalação */
        .install-banner {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 28px;
            padding: 10px 12px;
            margin-bottom: 16px;
            display: none;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .install-banner.show {
            display: flex;
        }

        .install-icon {
            font-size: 28px;
        }

        .install-text {
            flex: 1;
            font-size: 11px;
            color: #1a4373;
            font-weight: 500;
        }

        .install-btn {
            background: #25d366;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 11px;
        }

        /* Rodapé */
        .footer {
            text-align: center;
            margin-top: 16px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 10px;
        }

        .versao {
            font-size: 9px;
            opacity: 0.6;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Banner de instalação -->
        <div id="installBanner" class="install-banner">
            <div class="install-icon">📲</div>
            <div class="install-text">
                <strong>Instalar Agro Pro</strong><br>
                Adicionar à tela inicial
            </div>
            <button class="install-btn" onclick="instalarApp()">Instalar</button>
        </div>

        <!-- Card Principal -->
        <div class="hero-card">
            <div class="logo">🚜</div>
            <h1>Agro Pro</h1>
            <div class="subtitle">Controle de Frota</div>
            
            <div class="tagline">
                ⚡ <strong>Horímetro vs Relógio</strong> | Alerta diferença >30min
            </div>

            <button class="btn-entrar" onclick="abrirApp()">
                ▶ ENTRAR
            </button>

            <div class="info-grid">
                <div class="info-card">
                    <div class="info-icon">⏱️</div>
                    <h3>Horímetro</h3>
                    <p>Registro</p>
                </div>
                <div class="info-card">
                    <div class="info-icon">⚠️</div>
                    <h3>Alertas</h3>
                    <p>Diferenças</p>
                </div>
                <div class="info-card">
                    <div class="info-icon">📊</div>
                    <h3>Histórico</h3>
                    <p>Sessões</p>
                </div>
                <div class="info-card">
                    <div class="info-icon">📄</div>
                    <h3>PDF/WA</h3>
                    <p>Relatórios</p>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>© Agro Pro - João Divino</p>
            <div class="versao">✅ Funciona offline | Dados salvos localmente</div>
        </div>
    </div>

    <script>
        let deferredPrompt;

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBanner').classList.add('show');
        });

        function instalarApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(() => {
                    deferredPrompt = null;
                    document.getElementById('installBanner').classList.remove('show');
                });
            } else {
                alert("Abra o menu do navegador e selecione 'Adicionar à tela inicial'");
            }
        }

        function abrirApp() {
            window.location.href = 'app.html';
        }

        if (window.matchMedia('(display-mode: standalone)').matches) {
            document.getElementById('installBanner').style.display = 'none';
        }
    </script>
</body>
</html>
